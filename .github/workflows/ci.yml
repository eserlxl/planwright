name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh tests/*.sh tests/cases/*.sh

      - name: Lint Python engine scripts
        run: |
          python3 -m pip install --quiet pyflakes
          pyflakes scripts/*.py

      - name: Validate plugin manifests
        run: python3 -c "import json,glob;[json.load(open(f)) for f in glob.glob('.claude-plugin/*.json')]"

      - name: Smoke tests
        run: bash tests/run.sh
