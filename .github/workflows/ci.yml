name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Node lets the dashboard JS harness (DASH-FN, node-gated in tests/cases/dashboard.sh)
      # actually run in the smoke step instead of skipping, so a JS regression fails CI.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh tests/*.sh tests/cases/*.sh

      - name: Lint Python engine scripts
        run: |
          python3 -m pip install --quiet pyflakes mypy
          pyflakes scripts/*.py
          mypy --config-file mypy.ini scripts/

      - name: Validate plugin manifests
        run: python3 -c "import json,glob;[json.load(open(f)) for f in glob.glob('.claude-plugin/*.json')+glob.glob('.codex-plugin/*.json')]"

      - name: Smoke tests
        run: bash tests/run.sh

      - name: Coverage gate
        run: |
          python3 -m pip install --quiet coverage
          # Let the python3 subprocesses the shell suite spawns auto-start coverage.
          export COVERAGE_PROCESS_START="$PWD/.coveragerc"
          python3 -c "import sysconfig, pathlib; pathlib.Path(sysconfig.get_paths()['purelib'], 'coverage_subprocess.pth').write_text('import coverage; coverage.process_startup()')"
          # Fail fast if the subprocess coverage hook did not install: without the .pth the
          # python3 subprocesses the shell suite spawns run uninstrumented, so `coverage
          # combine` yields a misleadingly low report that could still pass the gate. Catch
          # that under-instrumentation here instead of trusting a silently-degraded number.
          python3 - <<'PY'
          import sysconfig, pathlib, sys
          p = pathlib.Path(sysconfig.get_paths()["purelib"], "coverage_subprocess.pth")
          if not p.exists():
              sys.stderr.write(f"subprocess coverage hook missing: {p} was not installed; "
                               "subprocess coverage would be silently under-instrumented\n")
              sys.exit(1)
          PY
          coverage erase
          coverage run -m unittest discover -s tests/unit -p "test_*.py"
          bash tests/run.sh
          coverage combine
          coverage report --fail-under=90

      # JS coverage for the dashboard client modules — the analog of the Python gate above.
      # Loads every view under NODE_V8_COVERAGE via the shared collector, then reduces the V8
      # output to one deterministic percentage over scripts/dashboard/ (vendor/ excluded).
      # Floor (65%) sits a few points below the ~72.9% baseline; rationale + the
      # lockstep with tests/cases/dashboard.sh DASH-JS-COV-PCT in docs/js-coverage-floor.md.
      - name: JS coverage (dashboard)
        run: |
          export NODE_V8_COVERAGE="$PWD/.jscov"
          node tests/cases/lib/dashboard-coverage-load.js "$PWD/scripts/dashboard"
          python3 scripts/js-coverage-report.py "$PWD/.jscov" --root . --fail-under 65
