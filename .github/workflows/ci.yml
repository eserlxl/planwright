name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh tests/*.sh tests/cases/*.sh

      - name: Lint Python engine scripts
        run: |
          python3 -m pip install --quiet pyflakes mypy
          pyflakes scripts/*.py
          mypy --config-file mypy.ini scripts/

      - name: Validate plugin manifests
        run: python3 -c "import json,glob;[json.load(open(f)) for f in glob.glob('.claude-plugin/*.json')+glob.glob('.codex-plugin/*.json')]"

      - name: Smoke tests
        run: bash tests/run.sh

      - name: Coverage gate
        run: |
          python3 -m pip install --quiet coverage
          # Let the python3 subprocesses the shell suite spawns auto-start coverage.
          export COVERAGE_PROCESS_START="$PWD/.coveragerc"
          python3 -c "import sysconfig, pathlib; pathlib.Path(sysconfig.get_paths()['purelib'], 'coverage_subprocess.pth').write_text('import coverage; coverage.process_startup()')"
          coverage erase
          coverage run -m unittest discover -s tests/unit -p "test_*.py"
          bash tests/run.sh
          coverage combine
          coverage report --fail-under=90
