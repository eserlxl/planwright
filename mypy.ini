# Permissive mypy baseline for the planwright engine scripts.
#
# The engine is intentionally stdlib-only and largely duck-typed, so this gate is
# deliberately not strict: it does NOT force annotations on every function
# (check_untyped_defs stays off — that surfaces ~28 pre-existing findings best
# handled incrementally). What it DOES catch is a cross-module contract that would
# break only at runtime, plus scope/name bugs like reusing an `except ... as e`
# name. Tighten incrementally over time.
[mypy]
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
